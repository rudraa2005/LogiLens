syntax = "proto3";

package route;

option go_package = "github.com/rudraa2005/LogiLens";

service RouteService {
    rpc ComputeRoute(RouteRequest) returns (RouteResponse);
}

message RouteRequest {
    string source = 1;
    string destination = 2;

    OptimizationType optimize_by = 3;
    repeated TransportMode allowed_modes = 4;
    int64 departure_time_unix = 5;
}

message RouteResponse {
    string route_id = 1;

    repeated RouteStep steps = 2;

    double total_distance = 3;
    double total_time = 4;
    double total_cost = 5;

    repeated RouteAlternative alternatives = 6;

    string explanation = 7;

    double time_saved = 8;
    double cost_saved = 9;

    double confidence_score = 10;

    repeated LatLng polyline = 11;
}

message RouteAlternative {
    string route_id = 1;

    repeated RouteStep steps = 2;

    double total_distance = 3;
    double total_time = 4;
    double total_cost = 5;

    repeated LatLng polyline = 6;
}

message LatLng {
    double lat = 1;
    double lng = 2;
}

message RouteStep {
    string from = 1;
    string to = 2;

    TransportMode mode = 3;

    double distance = 4;
    double time = 5;
    double cost = 6;

    repeated LatLng geometry = 7;
}

enum OptimizationType {
    DISTANCE = 0;
    TIME = 1;
    COST = 2;
}

enum TransportMode {
    TRUCK = 0;
    AIR = 1;
    RAIL = 2;
    SHIP = 3;
}
